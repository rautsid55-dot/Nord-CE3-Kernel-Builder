name: Build Ziti Kernel (Flashable Zip)

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile & Package Kernel
    runs-on: ubuntu-22.04
    
    steps:
    - name: 🛠️ Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git libssl-dev make zip zlib1g-dev libelf-dev

    - name: 🧠 Set Up Ccache (Resume Ability)
      uses: actions/cache@v3
      with:
        path: ~/.ccache
        key: kernel-ccache-${{ github.sha }}
        restore-keys: |
          kernel-ccache-

    - name: 📥 Clone Ziti Kernel Source (Voltage OS Android 16)
      run: |
        git clone https://github.com/amit-0i/android_kernel_oneplus_sm8350.git -b 16.2 source

    - name: 📥 Pull Proton-Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: ⚙️ Compile Kernel Image & Modules
      run: |
        cd source
        
        export CCACHE_DIR=~/.ccache
        export CCACHE_EXEC=$(which ccache)
        ccache -M 10G
        
        export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
        
        # 1. Initialize configuration safely without variable shortcuts
        make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCC="ccache gcc" HOSTCXX="ccache g++" KCFLAGS="-Wno-error" vendor/lahaina-qgki_defconfig
        
        # 2. Build BOTH the Image and the crucial hardware modules safely
        make -j2 O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCC="ccache gcc" HOSTCXX="ccache g++" KCFLAGS="-Wno-error" Image modules

    - name: 📦 Package into AnyKernel3 Zip
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        cp source/out/arch/arm64/boot/Image AnyKernel3/ || echo "Image not found"
        
        # Create module path and securely copy all compiled .ko files
        mkdir -p AnyKernel3/modules/vendor/lib/modules
        find source/out -type f -name "*.ko" -exec cp {} AnyKernel3/modules/vendor/lib/modules/ \;
        
        # Auto-generate perfect anykernel.sh with modules enabled
        cat << 'EOF' > AnyKernel3/anykernel.sh
        properties() { '
        kernel.string=Ziti Custom Kernel (Android 16 + Modules)
        do.devicecheck=1
        do.modules=1
        do.systemless=1
        do.cleanup=1
        do.cleanuponabort=0
        device.name1=ziti
        device.name2=CPH2569
        device.name3=OP5953L1
        device.name4=
        device.name5=
        supported.versions=
        supported.patchlevels=
        supported.vendorpatchlevels=
        '; }
        
        boot_attributes() {
        set_perm_recursive 0 0 755 644 $RAMDISK/*;
        set_perm_recursive 0 0 750 750 $RAMDISK/init* $RAMDISK/sbin;
        }
        
        BLOCK=boot;
        IS_SLOT_DEVICE=1;
        RAMDISK_COMPRESSION=auto;
        PATCH_VBMETA_FLAG=auto;
        
        . tools/ak3-core.sh;
        dump_boot;
        write_boot;
        EOF
        
        cd AnyKernel3
        zip -r9 ../Ziti-Custom-Kernel-Flashable.zip *

    - name: 📤 Upload Final Flashable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Ziti-Custom-Kernel-Flashable
        path: Ziti-Custom-Kernel-Flashable.zip
