name: Build Ziti Kernel

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - name: Install Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        bc \
        bison \
        build-essential \
        ccache \
        curl \
        flex \
        git \
        libelf-dev \
        libssl-dev \
        lld \
        llvm \
        clang \
        zip \
        unzip \
        rsync \
        python3

  - name: Setup CCache
    uses: actions/cache@v4
    with:
      path: ~/.ccache
      key: ziti-kernel-${{ github.ref_name }}
      restore-keys: |
        ziti-kernel-

  - name: Clone Kernel Source
    run: |
      git clone --depth=1 -b 16.2 \
      https://github.com/amit-0i/android_kernel_oneplus_sm8350.git source

  - name: Clone Proton Clang
    run: |
      git clone --depth=1 \
      https://github.com/kdrag0n/proton-clang.git toolchain

  - name: Configure Kernel
    run: |
      cd source

      export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"

      make O=out \
        ARCH=arm64 \
        LLVM=1 \
        LLVM_IAS=1 \
        vendor/lahaina-qgki_defconfig

      if [ -f arch/arm64/configs/vendor/oplus_yupik_QGKI.config ]; then
        cat arch/arm64/configs/vendor/oplus_yupik_QGKI.config >> out/.config
      fi

      make O=out \
        ARCH=arm64 \
        LLVM=1 \
        LLVM_IAS=1 \
        olddefconfig

  - name: Build Kernel
    run: |
      cd source

      export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"

      export CCACHE_DIR="$HOME/.ccache"
      ccache -M 10G

      make -j$(nproc) \
        O=out \
        ARCH=arm64 \
        LLVM=1 \
        LLVM_IAS=1 \
        CC="ccache clang" \
        Image modules dtbs

  - name: Show Build Information
    run: |
      cd source

      echo "===== IMAGE ====="
      ls -lh out/arch/arm64/boot/Image

      echo "===== MODULE COUNT ====="
      find out -name "*.ko" | wc -l

      echo "===== KERNEL RELEASE ====="
      cat out/include/config/kernel.release || true

      echo "===== LOCALVERSION ====="
      grep CONFIG_LOCALVERSION out/.config || true

  - name: Clone AnyKernel3
    run: |
      git clone --depth=1 \
      https://github.com/osm0sis/AnyKernel3.git AnyKernel3

  - name: Package Kernel
    run: |
      cp source/out/arch/arm64/boot/Image AnyKernel3/

      mkdir -p AnyKernel3/modules

      find source/out -name "*.ko" \
        -exec cp {} AnyKernel3/modules/ \; || true

      cd AnyKernel3
      zip -r9 ../NordCE3-Kernel.zip *

  - name: Upload Kernel Zip
    uses: actions/upload-artifact@v4
    with:
      name: NordCE3-Kernel
      path: NordCE3-Kernel.zip

  - name: Upload Debug Files
    uses: actions/upload-artifact@v4
    with:
      name: Kernel-Debug
      path: |
        source/out/.config
        source/out/Module.symvers
        source/out/System.map
```
