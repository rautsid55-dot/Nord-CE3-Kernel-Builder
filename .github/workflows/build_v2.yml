name: Build Ziti Kernel (Flashable Zip)

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile & Package Kernel
    runs-on: ubuntu-22.04
    
    steps:
    - name: 🛠️ Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git libssl-dev make zip zlib1g-dev libelf-dev

    - name: 🧠 Set Up Ccache (Resume Ability)
      uses: actions/cache@v3
      with:
        path: ~/.ccache
        key: kernel-ccache-${{ github.sha }}
        restore-keys: |
          kernel-ccache-

    - name: 📥 Clone Ziti Kernel Source
      run: |
        git clone https://github.com/LineageOS/android_kernel_oneplus_sm8350.git -b lineage-21 source

    - name: 📥 Pull Proton-Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: ⚙️ Compile the Kernel
      run: |
        cd source
        
        # Configure Ccache memory limit
        export CCACHE_DIR=~/.ccache
        export CCACHE_EXEC=$(which ccache)
        ccache -M 10G
        
        export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
        
        # 1. Initialize the configuration directly without nested string variables
        make O=out ARCH=arm64 CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCC="ccache gcc" HOSTCXX="ccache g++" vendor/lahaina-qgki_defconfig
        
        # 2. Build the compressed kernel image safely resuming from cache
        make -j2 O=out ARCH=arm64 CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCC="ccache gcc" HOSTCXX="ccache g++" Image

    - name: 📦 Package into AnyKernel3 Zip
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        cp source/out/arch/arm64/boot/Image AnyKernel3/ || echo "Image not found"
        cd AnyKernel3
        zip -r9 ../Ziti-Custom-Kernel-Flashable.zip *

    - name: 📤 Upload Final Flashable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Ziti-Custom-Kernel-Flashable
        path: Ziti-Custom-Kernel-Flashable.zip
