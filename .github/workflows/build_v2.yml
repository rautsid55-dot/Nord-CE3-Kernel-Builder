name: Build Ziti Kernel (Security Bypass)

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile & Package Kernel
    runs-on: ubuntu-22.04
    
    steps:
    - name: 🛠️ Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git libssl-dev make zip zlib1g-dev libelf-dev

    - name: 🧠 Set Up Ccache (Resume Ability)
      uses: actions/cache@v3
      with:
        path: ~/.ccache
        key: kernel-ccache-${{ github.sha }}
        restore-keys: |
          kernel-ccache-

    - name: 📥 Clone Ziti Kernel Source
      run: |
        git clone https://github.com/amit-0i/android_kernel_oneplus_sm8350.git -b 16.2 source

    - name: 📥 Pull Proton-Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: ⚙️ Hack Security and Compile Kernel Image
      run: |
        cd source
        export CCACHE_DIR=~/.ccache
        export CCACHE_EXEC=$(which ccache)
        ccache -M 10G
        export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
        
        # 1. Merge BOTH configurations (Base + OnePlus Specific)
        make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCC="ccache gcc" HOSTCXX="ccache g++" KCFLAGS="-Wno-error" vendor/lahaina-qgki_defconfig vendor/oplus_yupik_QGKI.config
        
        # 2. ASSASSINATE THE SECURITY LOCK
        # This tells the kernel to accept the old Voltage OS drivers without checking module_layout signatures!
        ./scripts/config --file out/.config --disable CONFIG_MODVERSIONS
        ./scripts/config --file out/.config --disable CONFIG_MODULE_SIG
        make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig
        
        # 3. Build only the Kernel Image (We don't need modules anymore!)
        make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCC="ccache gcc" HOSTCXX="ccache g++" KCFLAGS="-Wno-error" Image

    - name: 📦 Package into AnyKernel3 Zip
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        cp source/out/arch/arm64/boot/Image AnyKernel3/ || echo "Image not found"
        
        cat << 'EOF' > AnyKernel3/anykernel.sh
        properties() { '
        kernel.string=Ziti Custom Kernel (Security Bypass Edition)
        do.devicecheck=1
        do.modules=0
        do.systemless=0
        do.cleanup=1
        do.cleanuponabort=0
        device.name1=ziti
        device.name2=CPH2569
        device.name3=OP5953L1
        '; }
        
        boot_attributes() {
        set_perm_recursive 0 0 755 644 $RAMDISK/*;
        set_perm_recursive 0 0 750 750 $RAMDISK/init* $RAMDISK/sbin;
        }
        
        BLOCK=boot;
        IS_SLOT_DEVICE=1;
        RAMDISK_COMPRESSION=auto;
        PATCH_VBMETA_FLAG=auto;
        
        . tools/ak3-core.sh;
        dump_boot;
        write_boot;
        EOF
        
        cd AnyKernel3
        zip -r9 ../Ziti-Custom-Kernel-Flashable.zip *

    - name: 📤 Upload Final Flashable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Ziti-Custom-Kernel-Flashable
        path: Ziti-Custom-Kernel-Flashable.zip
