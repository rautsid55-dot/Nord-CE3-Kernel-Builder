name: Build Ziti Kernel (Flashable Zip)

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile & Package Kernel
    runs-on: ubuntu-latest
    
    steps:
    - name: 🛠️ Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git libssl-dev make zip zlib1g-dev libelf-dev

    - name: 📥 Clone Ziti Kernel Source
      run: |
        # Pulling the correct verified SM8350 common tree used for Ziti
        git clone https://github.com/LineageOS/android_kernel_oneplus_sm8350.git -b lineage-21 source

    - name: 📥 Pull Proton-Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

    - name: ⚙️ Compile the Kernel
      run: |
        cd source
        export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
        
        # We will attempt to build using the common vendor defconfig
        make O=out ARCH=arm64 CC=clang vendor/lahaina-qgki_defconfig
        
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- Image

    - name: 📦 Package into AnyKernel3 Zip
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        cp source/out/arch/arm64/boot/Image AnyKernel3/ || echo "Image not found"
        cd AnyKernel3
        zip -r9 ../Ziti-Custom-Kernel-Flashable.zip *

    - name: 📤 Upload Final Flashable Zip
      uses: actions/upload-artifact@v4
      with:
        name: Ziti-Custom-Kernel-Flashable
        path: Ziti-Custom-Kernel-Flashable.zip
